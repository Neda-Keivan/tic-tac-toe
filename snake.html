<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: monospace;
      color: #eee;
    }
    h1 { font-size: 2rem; margin-bottom: 10px; letter-spacing: 4px; color: #4ecca3; }
    #scoreboard {
      display: flex;
      gap: 40px;
      margin-bottom: 14px;
      font-size: 1rem;
    }
    #scoreboard span { color: #4ecca3; font-weight: bold; font-size: 1.2rem; }
    canvas {
      border: 2px solid #4ecca3;
      border-radius: 4px;
      background: #16213e;
      display: block;
    }
    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    #overlay h2 { font-size: 1.8rem; color: #e94560; }
    #overlay p { color: #aaa; font-size: 0.95rem; }
    button {
      padding: 10px 32px;
      background: #4ecca3;
      color: #1a1a2e;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-family: monospace;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
    }
    button:hover { background: #38b28c; }
    #instructions {
      margin-top: 14px;
      font-size: 0.8rem;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="scoreboard">
    Score: <span id="score">0</span>
    &nbsp;&nbsp;Best: <span id="best">0</span>
  </div>
  <div style="position:relative;">
    <canvas id="canvas" width="400" height="400"></canvas>
    <div id="overlay">
      <h2 id="overlay-title">SNAKE</h2>
      <p id="overlay-msg">Use arrow keys or WASD to move</p>
      <button id="btn">Play</button>
    </div>
  </div>
  <p id="instructions">Arrow keys / WASD to move &nbsp;|&nbsp; P to pause</p>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayMsg = document.getElementById('overlay-msg');
    const btn = document.getElementById('btn');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');

    const GRID = 20;
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;

    let snake, dir, nextDir, food, score, best, running, paused, interval;

    best = parseInt(localStorage.getItem('snakeBest') || '0');
    bestEl.textContent = best;

    function init() {
      snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      scoreEl.textContent = 0;
      paused = false;
      placeFood();
    }

    function placeFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function step() {
      if (paused) return;
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
          snake.some(s => s.x === head.x && s.y === head.y)) {
        gameOver();
        return;
      }

      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem('snakeBest', best);
        }
        placeFood();
      } else {
        snake.pop();
      }
      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Grid dots
      ctx.fillStyle = '#1e2d50';
      for (let x = 0; x < COLS; x++)
        for (let y = 0; y < ROWS; y++)
          ctx.fillRect(x * GRID + GRID / 2 - 1, y * GRID + GRID / 2 - 1, 2, 2);

      // Food
      ctx.fillStyle = '#e94560';
      ctx.beginPath();
      ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // Snake
      snake.forEach((seg, i) => {
        const ratio = 1 - i / snake.length;
        ctx.fillStyle = i === 0 ? '#4ecca3' : `hsl(162, 60%, ${20 + ratio * 30}%)`;
        const pad = i === 0 ? 1 : 2;
        ctx.beginPath();
        ctx.roundRect(seg.x * GRID + pad, seg.y * GRID + pad, GRID - pad * 2, GRID - pad * 2, 3);
        ctx.fill();
      });
    }

    function startGame() {
      overlay.style.display = 'none';
      init();
      running = true;
      clearInterval(interval);
      interval = setInterval(step, 120);
      draw();
    }

    function gameOver() {
      running = false;
      clearInterval(interval);
      overlayTitle.textContent = 'GAME OVER';
      overlayMsg.textContent = `Score: ${score}`;
      btn.textContent = 'Play Again';
      overlay.style.display = 'flex';
    }

    btn.addEventListener('click', startGame);

    document.addEventListener('keydown', e => {
      if (!running) return;
      if (e.key === 'p' || e.key === 'P') {
        paused = !paused;
        return;
      }
      const map = {
        ArrowUp:    { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
        ArrowDown:  { x: 0, y:  1 }, s: { x: 0, y:  1 }, S: { x: 0, y:  1 },
        ArrowLeft:  { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
        ArrowRight: { x: 1,  y: 0 }, d: { x: 1,  y: 0 }, D: { x: 1,  y: 0 },
      };
      const d = map[e.key];
      if (d && !(d.x === -dir.x && d.y === -dir.y)) {
        nextDir = d;
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
